
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Parte 2 - Compra de Stickers</title>
    <style>
        .galeria-stickers {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .tarjeta-sticker {
            text-align: center;
            width: 200px;
        }
        .tarjeta-sticker img {
            width: 100%;
            height: auto;
        }
        .tarjeta-sticker input {
            width: 80%;
            margin-top: 10px;
            text-align: center;
        }
        .zona-control {
            text-align: center;
            margin-top: 20px;
        }
        #mensajeResultado {
            font-size: 1.2rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2 style="text-align: center;">Puedes llevar hasta 10 stickers en total</h2>

    <div class="galeria-stickers">
        <!-- Primer Sticker -->
        <div class="tarjeta-sticker">
            <img src="./img/ruedas.jpg" alt="Sticker Github">
            <input id="cantSticker1" type="number" min="0" placeholder="0">
        </div>
        <!-- Segundo Sticker -->
        <div class="tarjeta-sticker">
            <img src="./img/creature.jpg" alt="Sticker Slack">
            <input id="cantSticker2" type="number" min="0" placeholder="0">
        </div>
        <!-- Tercer Sticker -->
        <div class="tarjeta-sticker">
            <img src="./img/buzo.webp" alt="Sticker Git">
            <input id="cantSticker3" type="number" min="0" placeholder="0">
        </div>
    </div>

    <div class="zona-control">
        <!-- Párrafo nuevo encargado de mostrar los resultados dinámicos -->
        <p id="mensajeResultado">Llevas 0 stickers</p>
        <button id="btnVerificar">Verificar</button>
    </div>

    <script src="condiciones2.js"></script>
</body>
</html>
